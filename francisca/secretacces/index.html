<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IA Core | Access System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Fondo animado -->
    <div id="background"></div>

    <!-- Pantalla Principal -->
    <section id="app">

        <!-- Ventana -->
        <div class="window">

            <!-- Barra Superior -->
            <div class="window-top">

                <div class="window-buttons">

                    <span class="red"></span>
                    <span class="yellow"></span>
                    <span class="green"></span>

                </div>

                <h1>IA CORE v5.0</h1>

            </div>

            <!-- Contenido -->
            <div class="terminal">

                <div id="terminalText">

                </div>

                <span id="cursor">█</span>

            </div>

            <!-- Barra inferior -->
            <div class="bottom">

                <div class="progress">

                    <div id="progressBar"></div>

                </div>

                <p id="progressText">

                    Inicializando...

                </p>

            </div>

        </div>

    </section>

    <!-- Botón oculto -->
    <div id="buttonContainer">

        <button id="nextButton">

            Continuar

        </button>

    </div>

    <!-- Pantalla Final -->

    <section id="finalScreen">

        <div class="finalCard">

            <h2>Fin del análisis</h2>

            <p id="finalText">

            </p>


        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
